{% extends "base.html" %}
{% block title %}Login — nomos.ai{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
  <h2 class="text-2xl font-bold text-white mb-6">Sign in</h2>

  {% if error %}
  <div class="bg-red-900/30 border border-red-700 text-red-300 rounded-lg p-3 mb-4 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login" class="space-y-4">
    <div>
      <label class="block text-sm text-slate-400 mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Password</label>
      <input type="password" name="password" required
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:outline-none">
    </div>
    <button type="submit"
      class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-2.5 rounded-lg transition">
      Sign In
    </button>
  </form>
  <p class="text-center text-sm text-slate-500 mt-4">
    No account? <a href="/register" class="text-cyan-400 hover:underline">Register</a>
  </p>
</div>
{% endblock %}
