{% extends "base.html" %}
{% block title %}Login — nomos.ai{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-surface-container-lowest rounded-xl p-8">
    <h2 class="text-2xl font-bold tracking-tight text-on-surface mb-6">Sign in</h2>

    {% if error %}
    <div class="bg-red-50 text-red-700 rounded-xl p-3 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1.5">Email</label>
        <input type="email" name="email" required
          class="w-full bg-surface-container-low rounded-xl px-4 py-2.5 text-on-surface focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1.5">Password</label>
        <input type="password" name="password" required
          class="w-full bg-surface-container-low rounded-xl px-4 py-2.5 text-on-surface focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:outline-none transition-colors">
      </div>
      <button type="submit"
        class="w-full gradient-cta text-sm font-semibold px-6 py-2.5 rounded-full transition-all">
        Sign In
      </button>
    </form>
    <p class="text-center text-sm text-on-surface-variant mt-5">
      No account? <a href="/register" class="text-primary font-medium hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
