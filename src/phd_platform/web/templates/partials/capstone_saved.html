<!-- Capstone saved confirmation -->
<div class="bg-surface-container-lowest rounded-xl p-10 text-center">
  <span class="material-symbols-outlined text-emerald-600 text-4xl mb-3">check_circle</span>
  <h3 class="text-on-surface font-bold text-lg mb-2">Capstone Submitted</h3>
  <p class="text-on-surface-variant mb-1">{{ title }}</p>
  <p class="text-xs text-outline mb-8">ID: {{ capstone_id[:8] }}...</p>
  <a href="/defense/{{ capstone_id }}"
    class="inline-block bg-red-600 hover:bg-red-500 text-white text-sm font-semibold px-6 py-2.5 rounded-full transition-all">
    Schedule Defense
  </a>
  <p class="text-xs text-on-surface-variant mt-4">Or <a href="/dashboard" class="text-primary font-medium hover:underline">return to dashboard</a></p>
</div>
