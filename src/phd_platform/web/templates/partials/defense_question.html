<!-- Defense Q&A question — reviewer asks, student responds -->
<div class="space-y-4">
  <div class="bg-yellow-900/10 border border-yellow-800/30 rounded-xl p-5">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs text-yellow-400 font-semibold">{{ journal }}</span>
      <span class="text-xs text-slate-500">Round {{ round }}/{{ max_rounds }}</span>
    </div>
    <p class="text-slate-200">{{ question }}</p>
  </div>
  <form hx-post="/defense/{{ capstone_id }}/respond" hx-target="#qa-area" hx-swap="innerHTML"
        hx-indicator="#defense-loading">
    <textarea name="answer" rows="4" required
      class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white text-sm focus:border-cyan-500 focus:outline-none resize-none"
      placeholder="Your response to the reviewer..."></textarea>
    <div class="flex items-center justify-between mt-3">
      <span id="defense-loading" class="htmx-indicator text-sm text-cyan-400">Processing...</span>
      <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2.5 rounded-lg transition font-semibold">
        Submit Response
      </button>
    </div>
  </form>
</div>
