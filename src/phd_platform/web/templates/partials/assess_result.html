<!-- Assessment result — shown after all questions answered -->
<div class="bg-surface-container-lowest rounded-xl p-10 text-center ambient-shadow max-w-md mx-auto">
  <h2 class="text-xl font-bold text-on-surface mb-6">{{ module_name }}</h2>

  <div class="text-5xl font-bold mb-3
    {% if passed %}text-emerald-600{% else %}text-amber-600{% endif %}">
    {{ (score * 100)|round|int }}%
  </div>

  <p class="text-sm text-on-surface-variant mb-2">
    Threshold: {{ (threshold * 100)|round|int }}%
  </p>

  {% if passed %}
  <span class="inline-block bg-emerald-50 text-emerald-600 text-sm font-semibold px-4 py-1.5 rounded-full mb-8">
    Passed
  </span>
  {% else %}
  <span class="inline-block bg-amber-50 text-amber-600 text-sm font-semibold px-4 py-1.5 rounded-full mb-8">
    Below threshold — keep practicing
  </span>
  {% endif %}

  <div>
    <a href="/dashboard"
      class="inline-block gradient-cta text-sm font-semibold px-6 py-2.5 rounded-full transition-all">
      Back to Dashboard
    </a>
  </div>
</div>
