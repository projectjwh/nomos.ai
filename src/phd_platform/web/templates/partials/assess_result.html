<!-- Assessment result — shown after all questions answered -->
<div class="bg-slate-900 border {% if passed %}border-emerald-700/50{% else %}border-amber-700/50{% endif %} rounded-xl p-8 text-center">
  <div class="text-4xl mb-4">{% if passed %}✅{% else %}📝{% endif %}</div>
  <h2 class="text-2xl font-bold text-white mb-2">{{ module_name }}</h2>
  <div class="text-4xl font-bold mb-2 {% if passed %}text-emerald-400{% else %}text-amber-400{% endif %}">
    {{ (score * 100)|round|int }}%
  </div>
  <p class="text-slate-400 mb-6">
    Threshold: {{ (threshold * 100)|round|int }}% &middot;
    {% if passed %}
      <span class="text-emerald-400">Passed!</span>
    {% else %}
      <span class="text-amber-400">Below threshold — keep practicing</span>
    {% endif %}
  </p>
  <a href="/dashboard"
    class="inline-block bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2.5 rounded-lg transition font-semibold">
    Back to Dashboard
  </a>
</div>
