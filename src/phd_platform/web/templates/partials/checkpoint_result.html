<!-- Checkpoint grading result — Stitch tonal style -->
<div class="mt-4 rounded-xl px-5 py-4 text-sm
  {% if score >= 0.7 %}bg-emerald-50
  {% elif score >= 0.4 %}bg-amber-50
  {% else %}bg-red-50{% endif %}">
  <span class="font-semibold
    {% if score >= 0.7 %}text-emerald-600{% elif score >= 0.4 %}text-amber-600{% else %}text-red-600{% endif %}">
    {{ (score * 100)|round|int }}%
  </span>
  <span class="text-on-surface-variant ml-2">{{ feedback }}</span>
</div>
