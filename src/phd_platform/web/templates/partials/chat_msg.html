<!-- Chat message pair — appended via HTMX after each exchange -->
{% if student_msg %}
<div class="flex justify-end mb-3">
  <div class="max-w-[80%] rounded-2xl px-5 py-3.5 text-sm bg-primary-fixed text-on-primary-fixed">
    {{ student_msg }}
  </div>
</div>
{% endif %}
{% if tutor_msg %}
<div class="flex justify-start mb-3">
  <div class="max-w-[80%] rounded-2xl px-5 py-3.5 text-sm bg-surface-container-lowest text-on-surface ambient-shadow">
    {{ tutor_msg }}
  </div>
</div>
{% endif %}
{% if content %}
<div class="flex {% if role == 'user' %}justify-end{% else %}justify-start{% endif %} mb-3">
  <div class="max-w-[80%] rounded-2xl px-5 py-3.5 text-sm
    {% if role == 'user' %}bg-primary-fixed text-on-primary-fixed{% else %}bg-surface-container-lowest text-on-surface ambient-shadow{% endif %}">
    {{ content }}
  </div>
</div>
{% endif %}
