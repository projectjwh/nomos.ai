<!-- Placement result — shown after all modules are assessed -->
<div class="bg-slate-900 border border-emerald-700/50 rounded-xl p-8 text-center">
  <div class="text-4xl mb-4">🎓</div>
  <h2 class="text-2xl font-bold text-white mb-2">Placement Complete</h2>
  <p class="text-lg text-slate-300 mb-6">
    You're starting at <span class="text-cyan-400 font-bold">{{ starting_level }}</span> level
  </p>

  <!-- Score summary -->
  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-8 max-w-lg mx-auto text-left">
    {% for mod_id, score in scores.items() %}
    <div class="bg-slate-800 rounded-lg p-3">
      <div class="text-xs text-slate-500 font-mono">{{ mod_id }}</div>
      <div class="text-lg font-bold {% if score >= 0.9 %}text-emerald-400{% elif score >= 0.7 %}text-amber-400{% else %}text-red-400{% endif %}">
        {{ (score * 100)|round|int }}%
      </div>
    </div>
    {% endfor %}
  </div>

  <a href="/dashboard"
    class="inline-block bg-cyan-600 hover:bg-cyan-500 text-white px-8 py-3 rounded-xl transition font-semibold">
    Go to Dashboard
  </a>
</div>
