<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}nomos.ai{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface": "#f9f9fb",
            "surface-container-low": "#f3f3f5",
            "surface-container-lowest": "#ffffff",
            "surface-container-high": "#e8e8ea",
            "surface-container": "#eeeef0",
            "primary": "#004e9f",
            "primary-container": "#0066cc",
            "primary-fixed": "#d7e3ff",
            "on-surface": "#1a1c1d",
            "on-surface-variant": "#414753",
            "on-primary": "#ffffff",
            "on-primary-fixed": "#001b3e",
            "outline-variant": "#c1c6d5",
            "outline": "#727784",
            "secondary": "#5e5e63",
            "error": "#ba1a1a",
            "surface-tint": "#005cba",
          },
          borderRadius: { "xl": "1.5rem" },
          fontFamily: { "sans": ["Inter", "system-ui", "sans-serif"] },
        }
      }
    }
  </script>
  <script src="/static/js/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-on-surface min-h-screen">

  <!-- Glass Top Nav -->
  <nav class="fixed top-0 w-full z-50 glass-nav flex justify-between items-center px-6 py-3">
    <div class="flex items-center gap-8">
      <a href="/" class="text-xl font-bold tracking-tighter text-on-surface">nomos<span class="text-primary">.ai</span></a>
      <div class="hidden md:flex gap-6 text-sm font-medium">
        <a href="/" class="text-on-surface-variant hover:text-primary transition-colors">Explore</a>
        <a href="/dashboard" class="text-on-surface-variant hover:text-primary transition-colors">Dashboard</a>
        <a href="/docs-static/milestones.html" target="_blank" class="text-on-surface-variant hover:text-primary transition-colors">Milestones</a>
      </div>
    </div>
    <div class="flex items-center gap-4">
      {% if user %}
        <span class="text-sm text-on-surface-variant">{{ user.email }}</span>
        <a href="/logout" class="text-sm text-on-surface-variant hover:text-error transition-colors">Logout</a>
      {% else %}
        <a href="/login" class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors">Login</a>
        <a href="/register" class="gradient-cta text-sm font-semibold px-5 py-2 rounded-full transition-all">Get Started</a>
      {% endif %}
    </div>
  </nav>

  <!-- Content (with top padding for fixed nav) -->
  <main class="pt-20 pb-16">
    <div class="max-w-6xl mx-auto px-6">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-surface-container-low">
    <div class="max-w-6xl mx-auto px-6 py-8 text-center">
      <p class="label-archival text-on-surface-variant">nomos.ai &mdash; PhD-level adaptive education &middot; 5 disciplines &middot; 116 modules &middot; AI-powered defense</p>
    </div>
  </footer>

</body>
</html>
