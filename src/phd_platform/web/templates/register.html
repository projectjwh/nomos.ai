{% extends "base.html" %}
{% block title %}Register — nomos.ai{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
  <h2 class="text-2xl font-bold text-white mb-6">Create your account</h2>

  {% if error %}
  <div class="bg-red-900/30 border border-red-700 text-red-300 rounded-lg p-3 mb-4 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/register" class="space-y-4">
    <div>
      <label class="block text-sm text-slate-400 mb-1">Name</label>
      <input type="text" name="name" required
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Password</label>
      <input type="password" name="password" required minlength="6"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Interests (comma-separated)</label>
      <input type="text" name="interests" placeholder="causal inference, machine learning, finance"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-2">Disciplines to enroll in</label>
      <div class="grid grid-cols-2 gap-2">
        {% for d in disciplines %}
        <label class="flex items-center gap-2 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 cursor-pointer hover:border-cyan-600 transition">
          <input type="checkbox" name="disciplines" value="{{ d }}" class="accent-cyan-500">
          <span class="text-sm">{{ d.replace("_", " ").title() }}</span>
        </label>
        {% endfor %}
      </div>
    </div>
    <button type="submit"
      class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-2.5 rounded-lg transition">
      Create Account
    </button>
  </form>
  <p class="text-center text-sm text-slate-500 mt-4">
    Already have an account? <a href="/login" class="text-cyan-400 hover:underline">Login</a>
  </p>
</div>
{% endblock %}
