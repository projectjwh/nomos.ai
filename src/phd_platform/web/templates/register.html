{% extends "base.html" %}
{% block title %}Register — nomos.ai{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-surface-container-lowest rounded-xl p-8">
    <h2 class="text-2xl font-bold tracking-tight text-on-surface mb-6">Create your account</h2>

    {% if error %}
    <div class="bg-red-50 text-red-700 rounded-xl p-3 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/register" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1.5">Name</label>
        <input type="text" name="name" required
          class="w-full bg-surface-container-low rounded-xl px-4 py-2.5 text-on-surface focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1.5">Email</label>
        <input type="email" name="email" required
          class="w-full bg-surface-container-low rounded-xl px-4 py-2.5 text-on-surface focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1.5">Password</label>
        <input type="password" name="password" required minlength="6"
          class="w-full bg-surface-container-low rounded-xl px-4 py-2.5 text-on-surface focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1.5">Interests (comma-separated)</label>
        <input type="text" name="interests" placeholder="causal inference, machine learning, finance"
          class="w-full bg-surface-container-low rounded-xl px-4 py-2.5 text-on-surface placeholder:text-outline focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-2">Disciplines to enroll in</label>
        <div class="grid grid-cols-2 gap-2">
          {% for d in disciplines %}
          <label class="flex items-center gap-2.5 bg-surface-container-low rounded-xl px-3.5 py-2.5 cursor-pointer hover:bg-surface-container transition-colors">
            <input type="checkbox" name="disciplines" value="{{ d }}" class="accent-primary rounded">
            <span class="text-sm text-on-surface">{{ d.replace("_", " ").title() }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
      <button type="submit"
        class="w-full gradient-cta text-sm font-semibold px-6 py-2.5 rounded-full transition-all">
        Create Account
      </button>
    </form>
    <p class="text-center text-sm text-on-surface-variant mt-5">
      Already have an account? <a href="/login" class="text-primary font-medium hover:underline">Login</a>
    </p>
  </div>
</div>
{% endblock %}
