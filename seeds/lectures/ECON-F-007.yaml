# Author agent: teacher-econ (Prof. Elena Kovacs)
# Style: Socratic empiricist — real-world puzzles first, then formalize

module_id: ECON-F-007
title: "Why Are Some Countries Rich and Others Poor? GDP, Policy, and Growth"
author_agent_id: teacher-econ
level_tier: foundation
estimated_minutes: 40
prerequisites_summary: "Basic algebra (ECON-F-001) and familiarity with graphs. Some exposure to microeconomics (ECON-F-006) is helpful but not required."

learning_objectives:
  - "Define and measure GDP, inflation, and unemployment, and understand their interrelationships"
  - "Analyze short-run fluctuations using the IS-LM framework"
