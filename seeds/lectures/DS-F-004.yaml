blocks:
  - type: exposition
    content: |
      ## The Base Rate Trap

      A medical test is 99% accurate. You test positive. Are you sick? (Probably not.)

      Let's say 1 in 10,000 people have the disease. The test has:
      - Sensitivity (true positive rate): 99%
      - Specificity (true negative rate): 99%

      In a population of 1,000,000:
      - 100 have the disease → 99 test positive (true positives)
      - 999,900 are healthy → 9,999 test positive (false positives)

      **P(disease | positive test) = 99 / (99 + 9,999) ≈ 0.98%**

      Despite a "99% accurate" test, a positive result means less than 1% chance of disease! The **base rate** (how rare the disease is) overwhelms the test's accuracy.

      This isn't a toy example. It's why mammography screening is controversial, why drug tests produce so many false positives, and why your spam filter occasionally catches real emails. Every data scientist must internalize this.

  - type: exposition
    content: |
      ## Bayes' Theorem: Updating Beliefs With Evidence

      Bayes' theorem formalizes how evidence should change our beliefs:

      **P(A|B) = P(B|A) · P(A) / P(B)**

      - **P(A)** = prior: our belief about A before seeing evidence
      - **P(B|A)** = likelihood: how likely is the evidence if A is true
      - **P(B)** = marginal likelihood: how likely is the evidence overall
      - **P(A|B)** = posterior: our updated belief after seeing evidence

      ### The medical test, Bayesified

      - P(disease) = 0.0001 (prior)
      - P(positive | disease) = 0.99 (likelihood)
      - P(positive | no disease) = 0.01 (false positive rate)
      - P(positive) = 0.99(0.0001) + 0.01(0.9999) = 0.010098

      P(disease | positive) = 0.99 × 0.0001 / 0.010098 = **0.0098** ≈ 1%

      ### Sequential updating

      Bayes lets you update incrementally. A second positive test on the same person:
      - New prior: P(disease) = 0.0098 (posterior from first test)
      - P(disease | 2nd positive) = 0.99 × 0.0098 / [0.99(0.0098) + 0.01(0.9902)]
      - = 0.009702 / 0.019604 ≈ **0.495** ≈ 49.5%

      Two positive tests bring us from 0.01% to 49.5%. Evidence accumulates.

  - type: checkpoint
    content: "A spam filter flags 95% of spam and 3% of legitimate email. If 20% of incoming email is spam, what is the probability that a flagged email is actually spam? Show the full Bayes' theorem calculation."
    hint: "Let S = spam, F = flagged. You need P(S|F). You know P(F|S) = 0.95, P(F|not S) = 0.03, P(S) = 0.20."
    expected_answer: "P(S|F) = P(F|S)·P(S) / P(F). P(F) = P(F|S)·P(S) + P(F|not S)·P(not S) = 0.95(0.20) + 0.03(0.80) = 0.19 + 0.024 = 0.214. P(S|F) = 0.19/0.214 = 0.888 ≈ 88.8%. So about 11% of flagged emails are legitimate — that's the false discovery rate. If you receive 100 emails, 20 are spam and 80 are legitimate. The filter flags 19 spam and 2.4 legitimate emails for a total of 21.4. The relatively high base rate of spam (20%) makes the filter effective — compare this with the medical test where the base rate was 0.01%."
    concept: "bayes-theorem"

  - type: exposition
    content: |
      ## Estimation: Learning Parameters From Data

      ### Maximum Likelihood Estimation (MLE)

      Given data x₁, x₂, ..., xₙ from a distribution with unknown parameter θ, the MLE finds the θ that makes the observed data most probable:

      **θ̂_MLE = argmax_θ L(θ) = argmax_θ Π P(xᵢ | θ)**

      In practice, we maximize the **log-likelihood** (products become sums):

      **ℓ(θ) = Σ log P(xᵢ | θ)**

      ### Example: MLE for a normal distribution

      Data: x₁, ..., xₙ ~ N(μ, σ²). The log-likelihood is:

      ℓ(μ, σ²) = -(n/2)log(2πσ²) - (1/2σ²) Σ(xᵢ - μ)²

      Taking derivatives and setting to zero:
      - ∂ℓ/∂μ = (1/σ²) Σ(xᵢ - μ) = 0 → **μ̂ = x̄** (the sample mean)
      - ∂ℓ/∂σ² = -n/(2σ²) + (1/2σ⁴) Σ(xᵢ - μ)² = 0 → **σ̂² = (1/n) Σ(xᵢ - x̄)²**

      Note: the MLE for variance divides by n, not n-1. It's biased but consistent (converges to the true value as n → ∞).

      ### Method of Moments

      A simpler alternative: set population moments equal to sample moments.
      - First moment: E[X] = x̄ → solve for parameters
      - Second moment: E[X²] = (1/n) Σ xᵢ² → solve for remaining parameters

      MoM is easier but generally less efficient than MLE.

  - type: try_it
    content: "You observe 8 coin flips: H, H, T, H, H, H, T, H. Find the MLE for the probability of heads, p. Then compute the log-likelihood at p = 0.5 and at your MLE estimate. Which is higher, and why must it be?"
    hint: "Each flip is Bernoulli(p). The likelihood of 6 heads and 2 tails in 8 flips is proportional to p⁶(1-p)². Take the log, differentiate with respect to p, and set to zero."
    expected_answer: "Log-likelihood: ℓ(p) = 6 log(p) + 2 log(1-p). dℓ/dp = 6/p - 2/(1-p) = 0. 6(1-p) = 2p → 6 - 6p = 2p → p̂ = 6/8 = 0.75. At p = 0.5: ℓ(0.5) = 6 log(0.5) + 2 log(0.5) = 8 log(0.5) = -5.545. At p = 0.75: ℓ(0.75) = 6 log(0.75) + 2 log(0.25) = 6(-0.2877) + 2(-1.3863) = -1.7261 + (-2.7726) = -4.499. The MLE gives ℓ = -4.499 > -5.545, confirming that the MLE maximizes the likelihood — by definition, no other value of p can yield a higher log-likelihood."
    concept: "maximum-likelihood-estimation"

  - type: exposition
    content: |
      ## The Central Limit Theorem: Why Everything Is Normal

      The CLT is arguably the most important theorem in statistics:

      **If X₁, X₂, ..., Xₙ are i.i.d. with mean μ and variance σ², then as n → ∞:**

      **(X̄ - μ) / (σ/√n) → N(0, 1)**

      In plain English: the average of many independent random variables is approximately normally distributed, **regardless of the original distribution**.

      ### Why this matters

      - **Confidence intervals**: Because X̄ is approximately normal, we can construct:
        X̄ ± z_{α/2} · (s/√n)
        For 95% CI: X̄ ± 1.96 · (s/√n)

      - **Hypothesis testing**: The normality of X̄ justifies t-tests and z-tests

      - **Rule of thumb**: n ≥ 30 is usually enough for the CLT to kick in (less for symmetric distributions, more for heavily skewed ones)

      ### A visual intuition

      Roll a single die: uniform distribution on {1,2,3,4,5,6}. Not normal at all.
      Average of 2 dice: triangular distribution. Starting to look bell-shaped.
      Average of 30 dice: nearly perfectly normal with mean 3.5 and SD = (1.71/√30) ≈ 0.31.

  - type: checkpoint
    content: "A ride-sharing company's trip durations have mean 15 minutes and standard deviation 8 minutes (the distribution is right-skewed). If you sample 100 trips, what is the probability that the sample mean is between 14 and 16 minutes? Can you use the CLT here even though the underlying distribution is skewed?"
    hint: "By CLT, X̄ ~ N(μ, σ²/n) approximately. Compute the standard error σ/√n, then convert to z-scores."
    expected_answer: "Standard error = σ/√n = 8/√100 = 0.8 minutes. z₁ = (14 - 15)/0.8 = -1.25. z₂ = (16 - 15)/0.8 = 1.25. P(-1.25 < Z < 1.25) = P(Z < 1.25) - P(Z < -1.25) = 0.8944 - 0.1056 = 0.7888 ≈ 78.9%. Yes, the CLT applies despite the skewed underlying distribution because n = 100 is large enough. The CLT says X̄ is approximately normal regardless of the parent distribution's shape, as long as it has finite mean and variance. With n = 100, the approximation is excellent even for skewed distributions."
    concept: "central-limit-theorem"

  - type: exposition
    content: |
      ## Hypothesis Testing: Making Decisions Under Uncertainty

      ### The framework

      1. **Null hypothesis H₀**: the status quo (e.g., "the new drug has no effect")
      2. **Alternative hypothesis H₁**: what we want to show (e.g., "the drug works")
      3. **Test statistic**: a number computed from the data
      4. **p-value**: probability of seeing data this extreme *if H₀ is true*
      5. **Decision**: reject H₀ if p-value < α (significance level, typically 0.05)

      ### The z-test for a mean

      H₀: μ = μ₀ vs. H₁: μ ≠ μ₀

      Test statistic: **z = (x̄ - μ₀) / (s/√n)**

      Reject H₀ if |z| > z_{α/2} = 1.96 (for α = 0.05)

      ### What the p-value IS and ISN'T

      **IS**: The probability of observing a test statistic as extreme as (or more extreme than) what we got, assuming H₀ is true.

      **IS NOT**:
      - The probability that H₀ is true (that's a Bayesian posterior)
      - The probability of a Type I error (that's α, a fixed threshold)
      - The probability that the result replicates

      A p-value of 0.03 means: "If there's truly no effect, we'd see results this extreme only 3% of the time." It does NOT mean there's a 97% chance the effect is real.

  - type: worked_example
    content: |
      ## A/B Test: Does the New Checkout Page Convert Better?

      **Setup**: An e-commerce site tests a new checkout design.
      - Control (old design): n₁ = 5,000 visitors, 200 purchases → p̂₁ = 0.04
      - Treatment (new design): n₂ = 5,000 visitors, 240 purchases → p̂₂ = 0.048

      **Question**: Is the 0.8 percentage point difference real, or just noise?

      **Step 1**: State hypotheses
      - H₀: p₁ = p₂ (no difference)
      - H₁: p₁ ≠ p₂ (there is a difference)

      **Step 2**: Compute pooled proportion under H₀
      p̂ = (200 + 240) / (5000 + 5000) = 440/10000 = 0.044

      **Step 3**: Compute standard error
      SE = √[p̂(1-p̂)(1/n₁ + 1/n₂)] = √[0.044(0.956)(2/5000)] = √[0.0000168] = 0.0041

      **Step 4**: Compute z-statistic
      z = (p̂₂ - p̂₁) / SE = (0.048 - 0.04) / 0.0041 = 1.95

      **Step 5**: Find p-value
      p-value = 2 × P(Z > 1.95) = 2 × 0.0256 = 0.051

      **Step 6**: Decision
      p-value = 0.051 > α = 0.05 → **Fail to reject H₀**

      The difference is not statistically significant at the 5% level. But notice: it's *barely* not significant. With 1,000 more visitors per group, this likely would have been significant. This illustrates why **effect size** and **power analysis** matter more than p-value thresholds.

  - type: try_it
    content: "A factory claims its bolts have mean diameter 10mm. A quality inspector measures 36 bolts and finds x̄ = 10.2mm with s = 0.6mm. At α = 0.05, is there evidence the mean diameter differs from 10mm? Compute the test statistic, p-value, and a 95% confidence interval."
    hint: "Use a z-test (n is large enough). z = (x̄ - μ₀)/(s/√n). The 95% CI is x̄ ± 1.96 × (s/√n). Check whether μ₀ = 10 falls inside the CI — this should agree with your hypothesis test conclusion."
    expected_answer: "SE = s/√n = 0.6/√36 = 0.1. z = (10.2 - 10)/0.1 = 2.0. p-value = 2 × P(Z > 2.0) = 2 × 0.0228 = 0.0456. Since 0.0456 < 0.05, we reject H₀. There is statistically significant evidence that the mean diameter differs from 10mm. 95% CI = 10.2 ± 1.96(0.1) = (10.004, 10.396). Note that μ₀ = 10 falls outside this interval, consistent with rejecting H₀. The factory's bolts are running slightly large — 0.2mm above spec."
    concept: "hypothesis-testing"

  - type: exposition
    content: |
      ## The Perils of Multiple Testing

      If you test 20 hypotheses at α = 0.05, you expect 1 false positive even if nothing is real. This is the **multiple comparisons problem**.

      ### Real-world consequences

      - Testing 100 A/B experiments: ~5 will appear significant by chance
      - Scanning 20,000 genes for disease association: ~1,000 false positives
      - Data dredging: if you test enough hypotheses, you WILL find something "significant"

      ### Corrections

      - **Bonferroni**: divide α by the number of tests. Testing m hypotheses? Use α/m per test. Conservative but simple.
      - **Benjamini-Hochberg (FDR)**: controls the false discovery rate — the fraction of "discoveries" that are false. Less conservative, more power. This is standard in genomics and large-scale A/B testing.

      ### The broader lesson

      Statistical significance is not truth. It's a filter with known error rates. A p-value of 0.03 from a pre-registered, well-powered experiment is much more convincing than a p-value of 0.001 found after testing 500 hypotheses on the same dataset.

      As data scientists, we need to think about the **entire pipeline** of decisions, not just individual tests. What's your causal DAG? Was this hypothesis pre-registered or post-hoc? How many comparisons did you actually make?

  - type: try_it
    content: "A marketing team runs 20 independent A/B tests and reports that 3 of them showed statistically significant results at α = 0.05. They want to implement all 3 changes. What's the expected number of false positives among those 3? Apply the Bonferroni correction: what significance level should each test use, and how many of the 3 would likely survive?"
    hint: "Under H₀, each test has a 5% chance of a false positive. If all 20 nulls are true, expected false positives = 20 × 0.05. For Bonferroni, the per-test threshold becomes 0.05/20."
    expected_answer: "If all 20 null hypotheses are actually true, expected false positives = 20 × 0.05 = 1. So of the 3 'significant' results, about 1 is expected to be a false positive — that's a 33% false discovery rate. Bonferroni correction: α_per_test = 0.05/20 = 0.0025. If the original p-values for the 3 significant results were, say, 0.01, 0.03, and 0.04, only the first (p = 0.01) might survive after Bonferroni... and even that one (0.01 > 0.0025) would not. This seems harsh, but it correctly reflects that we need stronger evidence when making many comparisons. A better approach might be Benjamini-Hochberg FDR control at 5%, which would rank all 20 p-values and apply a stepped threshold — likely keeping 1-2 of the findings."
    concept: "multiple-testing"

  - type: reflection
    content: "Frequentist statistics asks 'how often would this procedure be correct in repeated sampling?' Bayesian statistics asks 'given this data, what should I believe?' A Bayesian would say the p-value framework is answering the wrong question — we want P(hypothesis | data), not P(data | hypothesis). But Bayesians must specify a prior, which introduces subjectivity. In what situations would you prefer a Bayesian approach over frequentist? When might the frequentist framework be more appropriate? Think about contexts like clinical trials, A/B testing, and scientific discovery."
    concept: "frequentist-vs-bayesian"
