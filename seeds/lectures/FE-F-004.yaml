blocks:
  - type: exposition
    content: |
      ## A Dollar Today Is Worth More Than a Dollar Tomorrow

      A dollar today is worth more than a dollar tomorrow. This one idea generates all of finance.

      Why? Three reasons:
      1. **Opportunity cost**: A dollar today can be invested to earn interest
      2. **Inflation**: A dollar tomorrow buys less than a dollar today
      3. **Risk**: A promised dollar tomorrow might not materialize

      The **time value of money** translates between present and future values:
      - **Future value**: FV = PV × (1 + r)ⁿ (compounding)
      - **Present value**: PV = FV / (1 + r)ⁿ (discounting)
      - **Continuous compounding**: FV = PV × e^(rT)

      Every financial instrument — bonds, stocks, options, mortgages, pensions — is ultimately a bundle of future cash flows. **Pricing = discounting expected future cash flows to the present.** The only questions are: what are the cash flows, and what discount rate to use?

  - type: exposition
    content: |
      ## Bond Pricing: Discounting in Practice

      A bond pays fixed coupons C every period and returns face value F at maturity T. Its price is the present value of all cash flows:

      **P = Σₜ₌₁ᵀ C/(1+y)ᵗ + F/(1+y)ᵀ**

      where y is the **yield to maturity** — the single discount rate that makes the present value equal the market price.

      ### Key Relationships
      - **Price and yield move inversely**: Higher rates → lower present values → lower bond prices
      - **Duration** measures interest rate sensitivity: ΔP/P ≈ -D × Δy
      - **Convexity** is the second-order correction: ΔP/P ≈ -D × Δy + ½C × (Δy)²

      ### Zero-Coupon Bond (the building block)
      A zero-coupon bond pays F at time T with no intermediate coupons:

      **P = F/(1+y)ᵀ = F × e^(-yT)** (continuous compounding)

      Any coupon bond can be decomposed into a portfolio of zero-coupon bonds. This is why the **zero curve** (yield as a function of maturity) is the fundamental object in fixed income.

  - type: checkpoint
    content: "A 3-year bond with face value $1,000 pays annual coupons of $50 (5% coupon rate). If the yield to maturity is 6%, what is the bond price? Is it trading at a premium or discount, and why?"
    hint: "P = 50/(1.06) + 50/(1.06)² + 1050/(1.06)³. A bond trades at a discount when coupon rate < yield."
    expected_answer: "P = 50/1.06 + 50/1.1236 + 1050/1.1910 = 47.17 + 44.50 + 881.60 = $973.27. The bond trades at a discount ($973.27 < $1,000 face value) because the coupon rate (5%) is less than the market yield (6%). Investors demand a yield of 6%, but the bond only pays 5% in coupons, so the price must be below par to make up the difference through capital appreciation as the bond 'pulls to par' at maturity. The $26.73 discount represents the present value of the 1% per year shortfall over 3 years."
    concept: "bond-pricing-discount"

  - type: exposition
    content: |
      ## Markowitz Portfolio Theory: The Birth of Quantitative Finance

      Harry Markowitz (1952) asked: how should a rational investor choose among risky assets? His answer revolutionized finance.

      ### Setup
      - n assets with expected returns μ ∈ Rⁿ and covariance matrix Σ ∈ Rⁿˣⁿ
      - Portfolio weights w ∈ Rⁿ with wᵀ1 = 1
      - Portfolio return: E[rₚ] = wᵀμ
      - Portfolio variance: σ²ₚ = wᵀΣw

      ### The Efficient Frontier
      For each target return r*, solve:

      **minimize wᵀΣw subject to wᵀμ = r*, wᵀ1 = 1**

      The set of (σₚ, E[rₚ]) pairs traces a **parabola** in mean-variance space — the efficient frontier. Portfolios below the frontier are inefficient (same risk, less return). Portfolios above are unattainable.

      ### The Key Insight
      **Diversification is the only free lunch in finance.** A portfolio of assets is less risky than its components because imperfectly correlated assets partially cancel each other's fluctuations. Markowitz proved that the optimal portfolio depends on the entire covariance structure, not just individual asset risks.

  - type: worked_example
    content: |
      ## Two-Asset Efficient Frontier

      **Setup**: Asset A (μ_A = 8%, σ_A = 15%) and Asset B (μ_B = 14%, σ_B = 25%) with correlation ρ = 0.3.

      **Portfolio with weight w in A and (1-w) in B**:
      - E[rₚ] = 0.08w + 0.14(1-w) = 0.14 - 0.06w
      - σ²ₚ = (0.15w)² + (0.25(1-w))² + 2(0.3)(0.15)(0.25)w(1-w)
      - σ²ₚ = 0.0225w² + 0.0625(1-w)² + 0.0225w(1-w)

      **Minimum variance portfolio**: Take dσ²ₚ/dw = 0.

      dσ²ₚ/dw = 0.045w - 0.125(1-w) + 0.0225(1-2w) = 0
      0.045w - 0.125 + 0.125w + 0.0225 - 0.045w = 0
      0.125w = 0.1025
      w* = 0.82

      **Minimum variance portfolio**: 82% A, 18% B
      - E[rₚ] = 0.14 - 0.06(0.82) = 9.08%
      - σ²ₚ = 0.0225(0.672) + 0.0625(0.0324) + 0.0225(0.82)(0.18) = 0.01512 + 0.002025 + 0.003321 = 0.02047
      - σₚ = 14.3%

      **The diversification benefit**: Asset A alone has σ = 15%, Asset B has σ = 25%, but the minimum variance portfolio has σ = 14.3% — **less risky than the safer asset alone.**

  - type: try_it
    content: "Using the two-asset example above, what happens to the minimum variance portfolio if the correlation increases to ρ = 1.0? What about ρ = -1.0? What is the maximum diversification benefit (when is portfolio variance minimized for a given pair of assets)?"
    hint: "With ρ = 1, σₚ = |w·σ_A - (1-w)·σ_B| (if short-selling allowed) or w·σ_A + (1-w)·σ_B. With ρ = -1, you can construct a zero-risk portfolio."
    expected_answer: "ρ = 1: σₚ = w(0.15) + (1-w)(0.25) = 0.25 - 0.10w. This is linear — no diversification benefit! Minimum σ = 15% at w=1 (just asset A). ρ = -1: σₚ = |w(0.15) - (1-w)(0.25)| = 0 when 0.15w = 0.25(1-w), giving w = 0.25/0.40 = 0.625. A portfolio of 62.5% A and 37.5% B has ZERO risk with ρ = -1! This is perfect hedging. Maximum diversification benefit occurs at ρ = -1: risk can be completely eliminated. As ρ increases from -1 to +1, the diversification benefit shrinks monotonically. Real-world correlations (0.3-0.7 for stocks) give moderate but valuable diversification."
    concept: "diversification-correlation"

  - type: exposition
    content: |
      ## The Capital Asset Pricing Model (CAPM)

      Sharpe (1964) and Lintner (1965) asked: if all investors hold Markowitz-optimal portfolios, what are equilibrium asset prices?

      **CAPM**: E[rᵢ] = rᶠ + βᵢ(E[rₘ] - rᶠ)

      where:
      - rᶠ = risk-free rate
      - rₘ = market portfolio return
      - βᵢ = Cov(rᵢ, rₘ)/Var(rₘ) — the asset's systematic risk

      ### What CAPM Says
      1. **Only systematic risk is priced**: Idiosyncratic risk can be diversified away, so the market doesn't compensate you for it
      2. **Beta is the only risk measure that matters**: High-beta stocks earn higher expected returns
      3. **The market portfolio is efficient**: All investors hold some combination of the risk-free asset and the market

      ### The Security Market Line (SML)
      E[rᵢ] vs. βᵢ is a straight line with slope (E[rₘ] - rᶠ) — the market risk premium. Assets above the SML are "undervalued" (higher return than warranted by risk), assets below are "overvalued."

      ### CAPM's Limitations
      The model is elegant but empirically weak:
      - Small-cap and value stocks earn excess returns not explained by beta (Fama-French factors)
      - Low-beta stocks outperform CAPM predictions (the low-volatility anomaly)
      - Momentum (past winners continue winning) is unexplained by CAPM

  - type: checkpoint
    content: "A stock has β = 1.5. The risk-free rate is 3% and the expected market return is 9%. According to CAPM, what expected return should this stock offer? If the stock actually returns 13% on average, is it correctly priced, undervalued, or overvalued? What is Jensen's alpha?"
    hint: "CAPM expected return = rᶠ + β(E[rₘ] - rᶠ). Jensen's alpha = actual return - CAPM expected return. Positive alpha means the stock offers more return than its risk warrants."
    expected_answer: "CAPM: E[rᵢ] = 3% + 1.5(9% - 3%) = 3% + 9% = 12%. Actual return = 13%. Jensen's alpha = 13% - 12% = +1%. The stock is UNDERVALUED — it offers 1% more return than CAPM predicts for its level of systematic risk. It sits above the Security Market Line. An active manager who identified this stock has generated 1% of alpha (risk-adjusted excess return). However, in practice, positive alpha could reflect: (1) genuine mispricing, (2) exposure to unmodeled risk factors (size, value, momentum), or (3) estimation error."
    concept: "capm-alpha-beta"

  - type: exposition
    content: |
      ## Market Efficiency: Can Prices Be Predicted?

      The **Efficient Market Hypothesis** (Fama, 1970) comes in three forms:

      ### Weak Form
      Prices reflect all past trading data (prices, volume). Implication: **technical analysis doesn't work** — past price patterns can't predict future returns.

      ### Semi-Strong Form
      Prices reflect all public information (financial statements, news, economic data). Implication: **fundamental analysis doesn't work** — you can't beat the market by reading annual reports.

      ### Strong Form
      Prices reflect all information, including private (insider) information. Almost certainly false — insider trading is profitable (and illegal).

      ### The Evidence (as of 2024)
      - **Weak form**: Largely supported for liquid markets. Simple technical rules don't reliably profit after transaction costs. But momentum (6-12 months) and mean reversion (3-5 years) show some predictability.
      - **Semi-strong form**: Debated. Factor models (Fama-French, Carhart) explain many "anomalies," but new ones keep being discovered. The efficient market view: anomalies are compensation for risk. The behavioral view: anomalies reflect investor irrationality.
      - **Strong form**: Rejected. Insiders earn excess returns. Corporate buybacks (a legal form of insider trading) predict positive returns.

      ## No-Arbitrage: The Foundation of Derivatives Pricing

      An **arbitrage** is a trading strategy that:
      1. Costs nothing to enter
      2. Never loses money
      3. Sometimes makes money

      The **no-arbitrage principle**: In a well-functioning market, arbitrage opportunities are quickly eliminated. This is the most powerful assumption in finance — almost all derivatives pricing follows from it.

      ### The Law of One Price
      Two portfolios with identical future cash flows must have identical current prices. If not, buy the cheap one, sell the expensive one → riskless profit.

      ### Forward Pricing by No-Arbitrage
      A forward contract to buy a stock at price F at time T:
      - Strategy A: Buy forward at price F. At time T, pay F, receive stock (worth Sₜ).
      - Strategy B: Buy stock today at S₀, borrow S₀ at rate r. At time T, repay S₀e^(rT), still hold stock.

      Both strategies give you the stock at time T. By no-arbitrage:

      **F = S₀ · e^(rT)**

      If F > S₀e^(rT): sell forward, buy stock with borrowed money → arbitrage profit.
      If F < S₀e^(rT): buy forward, short stock, invest proceeds → arbitrage profit.

      **This is the template for all derivatives pricing**: replicate the payoff, price by no-arbitrage.

  - type: try_it
    content: "A non-dividend-paying stock trades at $100. The 1-year risk-free rate is 5% (continuous compounding). A 1-year forward contract on this stock trades at $108. Is there an arbitrage? If so, describe the exact trades, initial cash flow, and profit at maturity."
    hint: "Fair forward price = S₀ × e^(rT) = 100 × e^(0.05) ≈ 105.13. The actual forward price ($108) is too high. Sell the overpriced forward and create a synthetic long position."
    expected_answer: "Fair forward: F* = 100 × e^(0.05) = 105.13. Market forward = 108 > 105.13 → arbitrage exists. Trades at t=0: (1) Sell the forward at $108. (2) Buy the stock at $100. (3) Borrow $100 at 5%. Net cash flow at t=0: -100 + 100 = $0. At t=T (1 year): (1) Deliver stock via forward, receive $108. (2) Repay loan: 100 × e^(0.05) = $105.13. Net profit = 108 - 105.13 = $2.87, risklessly. This is a pure arbitrage: zero cost, zero risk, guaranteed $2.87 profit. In practice, transaction costs, margin requirements, and execution risk reduce but don't eliminate the opportunity."
    concept: "forward-pricing-no-arbitrage"

  - type: try_it
    content: "A put option with strike K and a call option with the same strike and expiration satisfy Put-Call Parity: C - P = S₀ - K·e^(-rT). A stock trades at $50, a 1-year call with K=$50 costs $5, and the risk-free rate is 4%. What should the put cost? If the put trades at $4, describe the arbitrage."
    hint: "Put-Call Parity gives P = C - S₀ + K·e^(-rT) = 5 - 50 + 50·e^(-0.04). If market P = 4, the put is too cheap relative to the call. Buy the put, sell the call, buy the stock."
    expected_answer: "Fair put: P = 5 - 50 + 50·e^(-0.04) = 5 - 50 + 48.04 = $3.04. Market put = $4 > $3.04 → put is overpriced (or equivalently, the relationship is violated). Arbitrage: Sell put at $4, buy call at $5, short stock at $50, invest $49 at 4%. At t=0: +4 - 5 + 50 - 49 = $0. At t=T: If S>50: call exercised, buy stock at 50, deliver to close short. Get 49·e^(0.04) = 50.98. Profit = 50.98 - 50 = $0.98. If S<50: put exercised, buy stock at 50 from put, deliver to close short. Get 50.98. Profit = 50.98 - 50 = $0.98. Either way, profit = $0.96. Actually let me redo: At t=0: Sell put (+4), buy call (-5), short stock (+50). Net = +49. Invest $49 at 4%. At T, $49e^(0.04)=51.00. If S_T>50: exercise call, pay $50, return stock. Profit = 51.00 - 50 = 1.00. If S_T<50: put is exercised against you, pay $50, receive stock, return stock. Profit = 51.00 - 50 = 1.00. Riskless profit = $0.96 (the difference between market put $4 and fair put $3.04, adjusted for financing)."
    concept: "put-call-parity-arbitrage"

  - type: reflection
    content: "This lecture built the conceptual foundation: time value of money gives us discounting, Markowitz gives us portfolio optimization, CAPM gives us equilibrium pricing, EMH questions whether any of this can generate alpha, and no-arbitrage gives us derivatives pricing. Notice the intellectual progression: from one simple idea (a dollar today > a dollar tomorrow), we derived bond pricing, portfolio theory, equilibrium returns, and the foundation of all derivative pricing. As a quant, you must hold two contradictory beliefs simultaneously: markets are efficient enough that easy money doesn't exist, but inefficient enough that sophisticated quantitative analysis can find edges. The model is a map — useful, but never the territory itself."
    concept: "finance-foundations-synthesis"
