    hint: "Iterative approach: build up the result character by character from the end. Recursive approach: first character goes to the end, reverse the rest. Edge cases: empty string, single character, palindrome."
    expected_answer: "Iterative solution:\n```python\ndef reverse_string(s: str) -> str:\n    result = ''\n    for char in s:\n        result = char + result\n    return result\n```\n\nRecursive solution:\n```python\ndef reverse_string(s: str) -> str:\n    if len(s) <= 1:\n        return s\n    return reverse_string(s[1:]) + s[0]\n```\n\nTests:\n```python\ndef test_reverse_normal():\n    assert reverse_string('hello') == 'olleh'\n\ndef test_reverse_empty():\n    assert reverse_string('') == ''\n\ndef test_reverse_single():\n    assert reverse_string('a') == 'a'\n\ndef test_reverse_palindrome():\n    assert reverse_string('racecar') == 'racecar'\n\ndef test_reverse_spaces():\n    assert reverse_string('a b c') == 'c b a'\n```"
