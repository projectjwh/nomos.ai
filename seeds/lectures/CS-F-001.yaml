  - type: worked_example
    content: |
      ## Putting It Together: A Linked List in C and Python

      A linked list is a sequence of nodes where each node points to the next. It illustrates functions, pointers, memory, and testing all at once.

      **C implementation:**
      ```c
      #include <stdlib.h>
      #include <stdio.h>

      typedef struct Node {
          int data;
          struct Node *next;  // pointer to next node
      } Node;

      // Create a new node (allocates on heap)
      Node* create_node(int data) {
          Node *node = malloc(sizeof(Node));
          node->data = data;
          node->next = NULL;
          return node;
      }

      // Prepend to front (O(1))
      Node* prepend(Node *head, int data) {
          Node *new_node = create_node(data);
          new_node->next = head;
          return new_node;
      }

      // Print all elements
      void print_list(Node *head) {
          Node *current = head;
          while (current != NULL) {
              printf("%d -> ", current->data);
              current = current->next;
          }
          printf("NULL\n");
      }

      // Free all nodes (prevent memory leak!)
      void free_list(Node *head) {
          while (head != NULL) {
              Node *temp = head;
              head = head->next;
              free(temp);
          }
      }
      ```

      **Python equivalent:**
      ```python
      class Node:
          def __init__(self, data: int, next_node: 'Node | None' = None):
              self.data = data
              self.next = next_node

      def prepend(head: Node | None, data: int) -> Node:
          return Node(data, head)

      def to_list(head: Node | None) -> list[int]:
          result = []
          while head:
              result.append(head.data)
              head = head.next
          return result
      ```

      Notice: Python has no `free_list` — the garbage collector handles it. C makes the memory management explicit, which is harder but gives you complete control. Understanding C's model helps you appreciate what Python does for you — and debug when it doesn't.

  - type: reflection
    content: "We've seen two languages at different levels of abstraction: Python hides memory management, C exposes it. What are the trade-offs? Python is safer and faster to write, but C gives you control and performance. Consider: if you're writing a web scraper, which would you choose and why? What about a real-time embedded system in a medical device? What does this tell you about the claim that one language is 'better' than another?"
    concept: "abstraction-tradeoffs"
