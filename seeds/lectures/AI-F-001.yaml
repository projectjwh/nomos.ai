  - type: exposition
    content: |
      ## Before You Build a Neural Network, You Need to Think in Tensors

      Before you build a neural network, you need to think in tensors.

      That statement might seem premature — we haven't even discussed what a neural network is yet. But here's the truth: **the single biggest barrier to understanding deep learning isn't the theory. It's the inability to fluently manipulate multi-dimensional arrays.**

      Every image is a 3D tensor (height x width x channels). Every batch of text embeddings is a 2D matrix. Every convolutional filter is a 4D tensor. If you can't reshape, slice, broadcast, and differentiate these objects in your sleep, you'll spend 90% of your time debugging shape mismatches instead of thinking about models.

      This lecture builds your scientific computing foundation: **Jupyter** for interactive experimentation, **NumPy** for fast array computation, **SciPy** for scientific routines, and **PyTorch** for tensor operations with automatic differentiation.

      ### Jupyter: Your ML Laboratory

      Jupyter notebooks (.ipynb) are the standard environment for ML research. Each notebook is a sequence of **cells** — code cells that execute Python, and markdown cells for documentation. Key practices: always **restart and run all** before sharing, use `%timeit` to benchmark operations, and keep imports in the first cell. Scripts are for production; notebooks are for discovery.

      ## NumPy: The Foundation of Scientific Python

      NumPy's core object is the **ndarray** — an n-dimensional array of homogeneous data stored in contiguous memory.

      ### Array Creation
      ```python
      import numpy as np

      a = np.array([1, 2, 3])              # from list — shape (3,)
      b = np.zeros((3, 4))                  # 3×4 matrix of zeros
      c = np.ones((2, 3, 4))               # 3D tensor of ones
      d = np.arange(0, 10, 0.5)            # evenly spaced values
      e = np.linspace(0, 1, 100)           # 100 points from 0 to 1
      I = np.eye(3)                         # 3×3 identity matrix
      r = np.random.randn(3, 4)            # standard normal samples
      ```

      ### Why Not Just Use Python Lists?
      Python lists store pointers to objects scattered in memory. NumPy arrays store raw numbers in contiguous blocks. This means:
      - **Vectorized operations** replace slow Python loops with fast C code
      - A `1000×1000` matrix multiply: Python lists ≈ 30 seconds, NumPy ≈ 3 milliseconds — a **10,000× speedup**

