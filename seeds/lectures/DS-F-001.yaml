blocks:
  - type: exposition
    content: |
      ## Why Software Engineering Matters in Data Science

      Your first data science project will fail not because of bad models but because of bad code.

      Here's what actually kills data science projects:
      - **No version control** — you can't reproduce last Tuesday's results
      - **No tests** — a silent bug in your feature pipeline corrupts six months of predictions
      - **Spaghetti notebooks** — 400-cell Jupyter files that only run if you execute cells in a secret order
      - **No modularity** — copy-pasting the same data cleaning code across 12 scripts

      This lecture is about the engineering foundation that separates a data science *experiment* from a data science *product*. We'll write Python like software engineers, because that's what you are.

  - type: exposition
    content: |
      ## Clean Python: Functions, Types, and Structure

      ### Functions as units of thought

      Every function should do **one thing** and be testable in isolation:

      ```python
      # Bad: does three things, untestable
      def process(df):
          df = df.dropna()
          df['age_bucket'] = pd.cut(df['age'], bins=[0,18,35,65,100])
          model = train_model(df)
          return model

      # Good: each step is a separate, testable function
      def remove_missing(df: pd.DataFrame) -> pd.DataFrame:
          return df.dropna()

      def add_age_buckets(df: pd.DataFrame) -> pd.DataFrame:
          df = df.copy()
          df['age_bucket'] = pd.cut(df['age'], bins=[0, 18, 35, 65, 100])
          return df
      ```

      ### Type hints: documentation that the machine checks

      ```python
      def compute_z_score(values: np.ndarray, population_mean: float) -> np.ndarray:
          """Standardize values relative to a population mean."""
          return (values - population_mean) / values.std()
      ```

      Type hints catch bugs before they reach production. Use them everywhere.

      ### Project structure

      A minimal data science project looks like:
      ```
      my_project/
      ├── src/
      │   ├── __init__.py
      │   ├── data.py        # loading, cleaning
      │   ├── features.py    # feature engineering
      │   └── model.py       # training, evaluation
      ├── tests/
      │   ├── test_data.py
      │   └── test_features.py
      ├── notebooks/         # exploration only
      ├── pyproject.toml
      └── README.md
      ```

