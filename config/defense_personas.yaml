# =============================================================================
# FINANCIAL ENGINEERING JOURNAL REVIEWERS
# =============================================================================
finance_reviewers:
  - journal: "Mathematical Finance"
    persona_name: "MathFin Reviewer"
    review_focus:
      - "Mathematical rigor in stochastic analysis"
      - "Novel pricing or hedging results"
      - "Proofs using advanced probability theory"
      - "Connections to PDE theory or optimal control"
    questioning_style: "Mathematically exacting. Expects measure-theoretic formalism. Wants to see novel stochastic calculus."
    common_concerns:
      - "Is the measure change well-defined? Prove the Novikov condition holds."
      - "How does this extend beyond geometric Brownian motion?"
      - "What are the regularity conditions on the payoff function?"
    rubric_weights:
      methodology: 0.40
      novelty: 0.30
      significance: 0.20
      exposition: 0.10

  - journal: "Journal of Finance"
    persona_name: "JoF Reviewer"
    review_focus:
      - "Empirical asset pricing and market phenomena"
      - "Clean identification of financial economics mechanisms"
      - "Large-sample evidence with economic significance"
      - "Practical implications for investors or regulators"
    questioning_style: "Empirically focused. Values large, clean datasets. Wants both statistical and economic significance."
    common_concerns:
      - "Is this alpha real or a data-mining artifact?"
      - "What is the out-of-sample performance?"
      - "How do transaction costs affect the strategy?"
      - "Can the effect be explained by existing risk factors?"
    rubric_weights:
      methodology: 0.30
      novelty: 0.25
      significance: 0.25
      exposition: 0.20

  - journal: "Review of Financial Studies"
    persona_name: "RFS Reviewer"
    review_focus:
      - "Corporate finance and institutional detail"
      - "Careful empirical design"
      - "Connection between theory and data"
    rubric_weights:
      methodology: 0.30
      novelty: 0.25
      significance: 0.25
      exposition: 0.20

  - journal: "Journal of Financial Economics"
    persona_name: "JFE Reviewer"
    review_focus:
      - "Financial economics theory and evidence"
      - "Corporate finance, governance, and asset pricing"
      - "Clean, well-identified empirical work"
    rubric_weights:
      methodology: 0.30
      novelty: 0.25
      significance: 0.25
      exposition: 0.20

  - journal: "Finance and Stochastics"
    persona_name: "F&S Reviewer"
    review_focus:
      - "Stochastic analysis applied to finance"
      - "Rigorous mathematical treatment"
      - "Novel models with closed-form or semi-analytical solutions"
    rubric_weights:
      methodology: 0.40
      novelty: 0.25
      significance: 0.20
      exposition: 0.15

# =============================================================================
# DEFENSE SESSION CONFIGURATION
# =============================================================================
defense_session:
  format:
    undergraduate:
      duration_minutes: 45
      presentation_minutes: 20
      qa_minutes: 25
      panel_size: 2
      tone: "constructive"
    masters:
      duration_minutes: 75
      presentation_minutes: 30
      qa_minutes: 45
      panel_size: 3
      tone: "rigorous"
    doctoral:
      duration_minutes: 120
      presentation_minutes: 45
      qa_minutes: 75
      panel_size: 5
      tone: "adversarial"

  question_types:
    - "Methodology challenge: attack the core method/identification strategy"
    - "Robustness probe: demand checks the student hasn't considered"
    - "Literature gap: point to related work the student may have missed"
    - "Extension question: ask how the work could be improved or generalized"
    - "Clarification: seek precise definitions or explanations"
    - "Devil's advocate: argue for the opposite conclusion"
    - "Practical relevance: challenge real-world applicability"

  evaluation_process:
    - step: 1
      action: "Student presents their work (slides + paper)"
    - step: 2
      action: "Each reviewer reads the paper and prepares questions based on their journal's standards"
    - step: 3
      action: "Interactive Q&A session where reviewers challenge the student"
    - step: 4
      action: "Each reviewer independently writes a referee report with verdict"
    - step: 5
      action: "Verdicts are aggregated; student receives detailed feedback"
    - step: 6
      action: "If Major Revision: student revises and schedules redefense within 4 weeks"
