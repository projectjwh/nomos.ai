# =============================================================================
# DISCIPLINE 5: FINANCIAL ENGINEERING
# Reference: Princeton ORF, Stanford MS&E, MIT Sloan, Berkeley MFE, Columbia IEOR
# =============================================================================
financial_engineering:
  name: "Financial Engineering"
  reference_programs:
    - institution: "Princeton University"
      program: "PhD in Operations Research & Financial Engineering"
      core_sequence: ["ORF 515 (Stochastic Calculus)", "ORF 527 (Stochastic Control)", "ORF 535 (Financial Mathematics)"]
    - institution: "Stanford University"
      program: "PhD in Management Science & Engineering (Finance track)"
      core_sequence: ["MS&E 242 (Stochastic Decision Models)", "MS&E 348 (Financial Mathematics)"]
    - institution: "MIT"
      program: "PhD in Finance (Sloan)"
      core_sequence: ["15.450 (Analytics of Finance)", "15.437 (Options & Futures)"]
    - institution: "UC Berkeley"
      program: "MFE + PhD in Finance (Haas)"
      core_sequence: ["MFE 230D (Derivatives)", "MFE 230T (Empirical Finance)"]
    - institution: "Columbia University"
      program: "PhD in Financial Engineering (IEOR)"
      core_sequence: ["IEOR E4706 (Quantitative Finance)", "IEOR E4707 (Financial Engineering)"]

  levels:
    foundation:
      name: "Foundation"
      duration_weeks: "8-16"
      gate:
        required_score: 0.90
      modules:
        - id: "FE-F-001"
          name: "Calculus & Differential Equations"
          objectives: ["Multivariable calculus, optimization", "ODEs: first and second order, systems", "Introduction to PDEs (heat equation as preview of Black-Scholes)"]
          weeks: 3
        - id: "FE-F-002"
          name: "Linear Algebra & Matrix Computations"
          objectives: ["Matrix decompositions, condition numbers", "Numerical linear algebra basics", "Applications to portfolio optimization"]
          weeks: 3
        - id: "FE-F-003"
          name: "Probability & Stochastic Processes Introduction"
          objectives: ["Probability spaces, random variables, expectations", "Markov chains (discrete-time)", "Poisson processes and basic renewal theory", "Random walks and their financial interpretation"]
          textbooks: ["Ross — Introduction to Probability Models"]
          weeks: 3
        - id: "FE-F-004"
          name: "Foundations of Finance"
          objectives: ["Time value of money, bond pricing, yield curves", "Mean-variance portfolio theory (Markowitz)", "CAPM and factor models", "Market efficiency hypothesis and anomalies"]
          textbooks: ["Bodie, Kane & Marcus — Investments", "Luenberger — Investment Science"]
          weeks: 3
        - id: "FE-F-005"
          name: "Programming for Quant Finance"
          objectives: ["Python: NumPy, pandas, scipy for financial data", "C++ basics: memory management, STL, template basics", "Basic Bloomberg/market data API usage"]
          weeks: 3

    undergraduate:
      name: "Undergraduate"
      duration_weeks: "32-48"
      gate:
        required_score: 0.95
        capstone: "Build a derivatives pricing library + trading strategy backtest"
        defense:
          panel_size: 2
          journals: ["Quantitative Finance (Referee)", "Journal of Derivatives (Referee)"]
      modules:
        - id: "FE-U-001"
          name: "Stochastic Calculus I"
          objectives: ["Brownian motion: construction, properties, quadratic variation", "Itô's lemma and stochastic integration", "Stochastic differential equations (SDEs) and their solutions", "Girsanov's theorem and change of measure"]
          textbooks: ["Shreve — Stochastic Calculus for Finance II", "Øksendal — Stochastic Differential Equations"]
          weeks: 6
        - id: "FE-U-002"
          name: "Derivatives Pricing — Black-Scholes & Beyond"
          objectives: ["Derive Black-Scholes PDE from no-arbitrage and risk-neutral pricing", "Compute Greeks and understand hedging strategies", "Price American options (free boundary problems, optimal stopping)", "Local volatility (Dupire) and stochastic volatility (Heston) models", "Jump-diffusion models (Merton, Kou)"]
          textbooks: ["Hull — Options, Futures, and Other Derivatives", "Shreve — Stochastic Calculus for Finance II"]
          weeks: 6
        - id: "FE-U-003"
          name: "Fixed Income & Interest Rate Models"
          objectives: ["Term structure models: Vasicek, CIR, Hull-White", "HJM framework and forward rate modeling", "LIBOR/SOFR market models", "Bond option pricing and swaption valuation"]
          textbooks: ["Brigo & Mercurio — Interest Rate Models"]
          weeks: 5
        - id: "FE-U-004"
          name: "Numerical Methods for Finance"
          objectives: ["Monte Carlo simulation: variance reduction, quasi-Monte Carlo", "Finite difference methods for PDEs (explicit, implicit, Crank-Nicolson)", "Binomial and trinomial trees", "Fourier transform methods (Carr-Madan, COS method)"]
          textbooks: ["Glasserman — Monte Carlo Methods in Financial Engineering", "Duffy — Finite Difference Methods in Financial Engineering"]
          weeks: 5
        - id: "FE-U-005"
          name: "Risk Management"
          objectives: ["Value-at-Risk (VaR) and Expected Shortfall (CVaR)", "Credit risk models: structural (Merton), reduced-form (Jarrow-Turnbull)", "Copulas and dependence modeling", "Stress testing and scenario analysis", "Basel III/IV regulatory framework"]
          textbooks: ["McNeil, Frey & Embrechts — Quantitative Risk Management"]
          weeks: 5
        - id: "FE-U-006"
          name: "Statistical Methods in Finance"
          objectives: ["Factor models: Fama-French, Carhart, Barra", "Covariance estimation: Ledoit-Wolf shrinkage, random matrix theory", "GARCH family models for volatility", "Regime switching and hidden Markov models"]
          textbooks: ["Tsay — Analysis of Financial Time Series", "Campbell, Lo & MacKinlay — The Econometrics of Financial Markets"]
          weeks: 4
        - id: "FE-U-007"
          name: "Portfolio Optimization"
          objectives: ["Mean-variance optimization with constraints", "Black-Litterman model", "Risk parity and robust portfolio construction", "Transaction costs and portfolio rebalancing"]
          textbooks: ["Meucci — Risk and Asset Allocation", "Grinold & Kahn — Active Portfolio Management"]
          weeks: 4

    masters:
      name: "Masters"
      duration_weeks: "36-52"
      gate:
        required_score: 0.95
        capstone: "Novel quantitative trading strategy or pricing model with full risk framework"
        defense:
          panel_size: 3
          journals: ["Mathematical Finance (Referee)", "Journal of Financial Economics (Referee)", "Review of Financial Studies (Referee)"]
      modules:
        - id: "FE-M-001"
          name: "Advanced Stochastic Calculus & SDEs"
          objectives: ["Semimartingale theory and general stochastic integration", "BSDEs (backward stochastic differential equations) and their applications", "Malliavin calculus and applications to Greeks computation", "Rough volatility and fractional Brownian motion"]
          textbooks: ["Revuz & Yor — Continuous Martingales and Brownian Motion", "Nualart — The Malliavin Calculus and Related Topics"]
          weeks: 6
        - id: "FE-M-002"
          name: "Exotic Derivatives & Structured Products"
          objectives: ["Path-dependent options: Asian, barrier, lookback", "Multi-asset options: basket, rainbow, quanto", "Structured products: CLNs, CDOs, autocallables", "CVA/DVA/FVA (XVA) framework"]
          weeks: 5
        - id: "FE-M-003"
          name: "Market Microstructure"
          objectives: ["Order book dynamics and market making", "Price impact models (Kyle, Almgren-Chriss)", "Optimal execution and TWAP/VWAP strategies", "High-frequency data: realized volatility, lead-lag, microstructure noise"]
          textbooks: ["O'Hara — Market Microstructure Theory", "Cartea, Jaimungal & Penalva — Algorithmic and HFT"]
          weeks: 5
        - id: "FE-M-004"
          name: "Machine Learning in Finance"
          objectives: ["ML for alpha signal generation and feature engineering", "Deep hedging and neural network-based pricing", "Reinforcement learning for portfolio management", "Natural language processing for financial text (earnings calls, news, filings)", "Generative models for scenario generation"]
          weeks: 6
        - id: "FE-M-005"
          name: "Stochastic Control & Optimal Stopping"
          objectives: ["Hamilton-Jacobi-Bellman equation and viscosity solutions", "Merton portfolio problem and its extensions", "Optimal stopping: American options, real options", "Mean-field games and systemic risk"]
          textbooks: ["Fleming & Rishel — Deterministic and Stochastic Optimal Control", "Pham — Continuous-Time Stochastic Control and Optimization"]
          weeks: 6
        - id: "FE-M-006"
          name: "High-Frequency Trading Systems"
          objectives: ["Low-latency system architecture (C++, FPGA)", "Order management and execution algorithms", "Statistical arbitrage at high frequency", "Regulatory and ethical considerations"]
          weeks: 4

    doctoral:
      name: "Doctoral"
      duration_weeks: "52-104"
      gate:
        defense:
          panel_size: 5
          journals: ["Mathematical Finance (Referee)", "Journal of Finance (Referee)", "Review of Financial Studies (Referee)", "Journal of Financial Economics (Referee)", "Finance and Stochastics (Referee)"]
      modules:
        - id: "FE-D-001"
          name: "Dissertation — Novel Contribution to Mathematical Finance"
          objectives: ["Publish 2-3 papers in top finance/math-finance journals", "Advance pricing theory, risk management methodology, or market microstructure understanding"]
          weeks: 60
        - id: "FE-D-002"
          name: "Industry Bridge"
          objectives: ["Implement research in production-grade code", "Validate on real market data (with appropriate data licensing)"]
          weeks: 10

# =============================================================================
# CROSS-DISCIPLINE SHARED MODULES
# These modules appear as prerequisites or electives across multiple disciplines
# =============================================================================
shared:
  modules:
    - id: "SHARED-001"
      name: "Mathematical Maturity Assessment"
      description: "Adaptive diagnostic that evaluates proof-writing ability, mathematical intuition, and gap areas across calculus, linear algebra, probability, and real analysis."
      used_by: ["economics", "data_science", "computer_science", "ai_ml", "financial_engineering"]

    - id: "SHARED-002"
      name: "Research Ethics & Integrity"
      description: "Academic integrity, plagiarism, data fabrication, responsible conduct of research, IRB/ethics boards."
      required_at: "masters_entry"
      used_by: ["economics", "data_science", "computer_science", "ai_ml", "financial_engineering"]

    - id: "SHARED-003"
      name: "Academic Writing & Presentation"
      description: "LaTeX, scientific writing structure, literature reviews, presentation skills, responding to referee reports."
      required_at: "undergraduate_capstone"
      used_by: ["economics", "data_science", "computer_science", "ai_ml", "financial_engineering"]

    - id: "SHARED-004"
      name: "Reproducible Research & Version Control"
      description: "Git workflows, containerization, reproducible analysis (Jupyter, R Markdown), data versioning."
      required_at: "undergraduate"
      used_by: ["data_science", "computer_science", "ai_ml"]

# =============================================================================
# PROGRESSION RULES
# =============================================================================
progression:
  rules:
    - name: "Adaptive Placement"
      description: "New students take a diagnostic assessment. Modules with 90%+ mastery are waived. Modules below 80% trigger prerequisite chain remediation."

    - name: "Weakness Remediation Loop"
      description: "When a student scores below 80% on any module assessment, the system traces prerequisite chains backward, identifies the root weakness, and generates targeted review material. The student must pass the remediation assessment before retaking the module."

    - name: "A+ Mastery Gate"
      description: "Advancing between major levels (Foundation→Undergrad, Undergrad→Masters, Masters→Doctoral) requires 95%+ average across all level modules AND passing the capstone defense."

    - name: "Capstone Personalization"
      description: "Capstone projects are generated based on the student's declared interests, observed strengths (from module performance), and current research trends. AI provides ongoing consultation during capstone work."

    - name: "Defense Escalation"
      description: "Defense panels grow in size and rigor at each level: 2 reviewers (Undergrad), 3 reviewers (Masters), 5 reviewers (Doctoral). Reviewers adopt increasingly strict standards matching their journal's actual review culture."

    - name: "Cross-Discipline Electives"
      description: "Students may take modules from other disciplines as electives. A Data Science PhD student could take ECON-M-006 (Advanced Econometrics II) or FE-U-001 (Stochastic Calculus). Cross-discipline modules count toward breadth requirements."

    - name: "Resubmission Protocol"
      description: "If a defense results in 'Major Revision', the student receives detailed referee reports, has access to AI consultation for revisions, and may resubmit within the constraints defined per level. Maximum 2 resubmissions per capstone."
